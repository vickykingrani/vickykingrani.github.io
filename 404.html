<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found · Vicky Kingrani</title>
    <meta name="robots" content="noindex">
    <style>
        :root { --ink: #1a1c1f; --body: #41444d; --muted: #63656a; --paper: #fdfdfc; --rule: #e3e2de; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Libre Franklin', -apple-system, 'Segoe UI', sans-serif;
            background: var(--paper); color: var(--body);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        main { max-width: 560px; }
        .eyebrow {
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em;
            color: var(--muted); margin-bottom: 18px;
        }
        h1 {
            font-family: Besley, Georgia, serif; font-weight: 500; color: var(--ink);
            font-size: 2.6rem; line-height: 1.1; margin-bottom: 16px; letter-spacing: -0.02em;
        }
        p { font-size: 1.05rem; line-height: 1.65; margin-bottom: 28px; }
        nav { display: flex; gap: 28px; padding-top: 20px; border-top: 1px solid var(--rule); }
        a { color: var(--ink); text-decoration: underline; text-underline-offset: 4px; }
        a:focus-visible { outline: 3px solid var(--ink); outline-offset: 3px; }
    </style>
</head>
<body>
    <main>
        <p class="eyebrow">404 · Page not found</p>
        <h1>This page doesn't exist.</h1>
        <p>The address may have been mistyped, or the page has moved. Everything worth seeing is one click away.</p>
        <nav>
            <a href="/">Portfolio</a>
            <a href="/resume/">R&eacute;sum&eacute;</a>
            <a href="mailto:hello@vickykingrani.com">hello@vickykingrani.com</a>
        </nav>
    </main>
</body>
</html>
